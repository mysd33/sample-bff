# Tomcat metrics enabled
# Spring Cloud for AWS Micrometer CloudWatch Merics Integration Enabled if local testing is required
#server:
#  tomcat:
#    mbeanregistry:
#      enabled: true

spring:
  sql:
    init:
      platform: h2
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # 実行可能jar起動の場合にエラーが出るので回避策として追加
  h2:
    console:
      enabled: true
  devtools:
    livereload:
      enabled: true
  # WebClient ログ詳細化
  http:
    codecs:
      log-request-details: true

# Spring Security OAuth2 Client
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid, profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/demo
            #TODO: user-name-attributeの設定が必要か確認する
            #user-name-attribute: preferred_username
# Spring docs enabled  for local development
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    os:
      enabled: true
    java:
      enabled: true
        # Spring Cloud for AWS Micrometer CloudWatch Metrics Integration Enabled if local testing is required
        #  cloudwatch:
        #    metrics:
        #      export:
        #        enabled: true
#  endpoint:
#    env:
#      show-values: always

logging:
  level:
    org.springframework: INFO
    org.springframework.jdbc: INFO
#    org.springframework.security: TRACE
#    org.springframework.security.oauth2: TRACE
#    org.springframework.web.client: TRACE
    #    org.thymeleaf: DEBUG
    com.example: DEBUG
    # LogAspect 性能ログ出力
    com.example.fw.web.aspect.LogAspect: TRACE
    # WebClient ログ詳細化
    org.springframework.web.reactive.function.client.ExchangeFunctions: TRACE

# 拡張フレームワークのプロパティ
example:
  # Dynamic Routing DataSource
  datasource:
    read:
      url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    write:
      url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    dynamic-routing:
      enabled: true
  sqs:
    sqslocal:
      port: 18001
  s3:
    localfake:
      #S3 Fake by local file system
      type: file
      base-dir: C:\tmp\objectstorage
  #S3 Fake by LocalStack
  #      type: localstack
  #      port: 4566
  #      access-key-id: dummy
  #      secret-access-key: dummy
  #    bucket: mysd33bucket123
  #S3 Fake by s3rver
  #      type: s3rver
  #      port: 4568
  #    bucket: mysd33bucket123
  #S3 Fake by MinIO
  #      type: minio
  #      port: 9000
  #      access-key-id: minioadmin
  #      secret-access-key: minioadmin
  #    bucket: mysd33bucket123

  # 業務APのプロパティ
  # Spring Security Debug Mode
  #  security:
  #    debug: true
  api:
    backend:
      url: http://localhost:8000
    retry:
      max-attempts: 3
      min-backoff: 200

  async:
    queue: SampleQueue

  # OIDC認証の有効化
  oidc:
    enabled: true
